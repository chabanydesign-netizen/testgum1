<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chabany Design | Архітектура та Дизайн</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --accent: #d4a373; --dark-bg: #0a0a0a; --card-bg: #111; }
        
        body { font-family: 'Montserrat', sans-serif; background-color: var(--dark-bg); color: #ffffff; line-height: 1.6; }
        a { text-decoration: none; color: inherit; }

        /* --- HEADER --- */
        header { 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; 
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), url('img/banner.jpg') #111; /* Додано колір на випадок відсутності фото */
            background-size: cover;
            background-position: center;
            padding: 20px;
        }

        .logo-wrapper { width: 100%; max-width: 600px; margin-bottom: 40px; }
        .main-logo { width: 100%; height: auto; min-height: 100px; background: rgba(255,255,255,0.05); /* Видно блок, якщо немає картинки */ }

        .subtitle { display: block; font-size: 1.1rem; color: var(--accent); text-transform: uppercase; letter-spacing: 5px; margin-bottom: 25px; }

        .cta-btn {
            display: inline-block;
            padding: 16px 45px;
            border: 1px solid var(--accent);
            border-radius: 50px;
            font-weight: 600;
            text-transform: uppercase;
            color: #fff;
            transition: 0.3s;
        }
        .cta-btn:hover { background: var(--accent); color: #000; }

        /* --- СЕКЦІЇ --- */
        .section-title { font-size: 1.8rem; margin: 60px 0 40px; font-weight: 300; text-transform: uppercase; letter-spacing: 5px;
