<!DOCTYPE html>
<html>
<head>
  <title>D5VirtualTour</title>
  <meta
          name="viewport"
          content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, viewport-fit=cover"
  />
  <link rel="icon" href="favicon.ico">
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta http-equiv="Content-Type" content="text/html;charset=utf-8" />
  <meta http-equiv="x-ua-compatible" content="IE=edge" />
  <style>
    html {
      height: 100%;
    }

    body {
      height: 100%;
      overflow: hidden;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 16px;
      color: #ffffff;
      background-color: #000000;
    }
  </style>
</head>
<body>
<canvas id="image_helper" style="width: 0; display: none"></canvas>

<script src="tour.js"></script>
<script src="d5.js"></script>

<div id="pano" style="width: 100%; height: 100%">
  <noscript>
    <table style="width: 100%; height: 100%">
      <tr style="vertical-align: middle">
        <td>
          <div style="text-align: center">
            ERROR:<br /><br />Javascript not activated<br /><br />
          </div>
        </td>
      </tr>
    </table>
  </noscript>
  <script>
    const isPc = false;
    if (window.location.protocol  === "file:") {
      console.error("Error: You are opening the tour from local file. Please use a web server to access the tour, or some resources might not load correctly.");
      const isChinese = navigator.language.toLowerCase().startsWith("zh");
      const title = isChinese ? "无法直接打开此页面" : "This page cannot be opened directly";
      const desc = isChinese 
        ? "请双击当前文件夹中的 OpenTour 文件，以启动浏览器进行访问" 
        : "Please double-click the OpenTour file in the current folder to launch it in your browser";
      document.getElementById("pano").innerHTML = `
        <div style="display: flex; justify-content: center; align-items: center; width: 100%; height: 100%; text-align: center;">
          <div>
            <p style="font-size: 24px; margin-bottom: 16px;">${title}</p>
            <p style="font-size: 14px; color: #aaa;">${desc}</p>
          </div>
        </div>
      `;
    } else {
      embedpano({
        xml: "tour.xml",
        target: "pano",
        passQueryParameters: "startscene,startlookat",
        initvars: {
          dollhouseEnable: "true",
          punlicPath: "..",
          imagePx: "",
          curtime:"",
        },
      });
    }
  </script>
</div>
</body>
</html>
